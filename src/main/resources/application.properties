spring.application.name=ai-resume-analyzer
server.port=${PORT:8080}

# MongoDB configuration. Use MongoDB Atlas locally and on Render through MONGODB_URI.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/resume_analyzer_db}

spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB

# Optional Gemini setup. The app still returns rule-based suggestions if this is blank.
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
frontend.url=${FRONTEND_URL:}
